# =============================================================================
# WORKLOAD ROLE BINDINGS
# =============================================================================
# Binds each workload ServiceAccount to its respective Role.
#
# Pattern:
#   All microservices → "microservice-workload" role (same minimal permissions)
#   MongoDB           → "mongodb-workload" role (slightly broader for PVC access)
#
# Why bind all microservices to the SAME role?
#   In this architecture, all backend services have identical needs:
#   read configmaps and discover services. If a specific service needs
#   different permissions later, you create a new Role and bind only that SA.
# =============================================================================

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-workload-binding
  namespace: clahanstore
  labels:
    app.kubernetes.io/part-of: clahanstore-rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: microservice-workload
subjects:
  - kind: ServiceAccount
    name: api-gateway-sa
    namespace: clahanstore

