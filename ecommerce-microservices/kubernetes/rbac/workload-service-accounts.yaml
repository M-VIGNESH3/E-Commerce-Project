# =============================================================================
# WORKLOAD SERVICE ACCOUNTS
# =============================================================================
# Why one ServiceAccount per microservice?
#   The "default" ServiceAccount in every namespace has broad permissions.
#   By creating dedicated SAs, each pod runs with its OWN identity, enabling:
#   1. Per-service access control (service A can't access service B's secrets)
#   2. Audit trails (logs show WHICH service made API calls)
#   3. Secret isolation (each SA can only mount its own secrets)
#
# automountServiceAccountToken: false
#   By default, K8s mounts the SA token into every pod at
#   /var/run/secrets/kubernetes.io/serviceaccount/token
#   Most apps DON'T need to talk to the K8s API, so we disable this.
#   This prevents a compromised pod from using the token to access the API.
#
# To use these SAs, add to your deployment/statefulset spec:
#   spec:
#     template:
#       spec:
#         serviceAccountName: <service-name>-sa
#         automountServiceAccountToken: false
# =============================================================================

---
# ---- API Gateway ----
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: clahanstore
  labels:
    app.kubernetes.io/part-of: clahanstore-rbac
    app.kubernetes.io/component: api-gateway
automountServiceAccountToken: false

