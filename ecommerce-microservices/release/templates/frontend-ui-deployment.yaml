apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.frontendUi.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend-ui
  template:
    metadata:
      labels:
        app: frontend-ui
    spec:
      containers:
      - name: frontend-ui
        image: {{ .Values.frontendUi.image.repository }}:{{ .Values.frontendUi.image.tag }}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi