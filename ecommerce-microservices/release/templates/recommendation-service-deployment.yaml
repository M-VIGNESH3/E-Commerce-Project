apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.recommendationService.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
      - name: recommendation-service
        image: {{ .Values.recommendationService.image.repository }}:{{ .Values.recommendationService.image.tag }}
        ports:
        - containerPort: 3013
        env:
        - name: PORT
          value: '3013'
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: USER_SERVICE_URL
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: PRODUCT_SERVICE_URL
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: ORDER_SERVICE_URL
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: clahanstore-secrets
              key: MONGO_URI_RECOMMENDATION
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi