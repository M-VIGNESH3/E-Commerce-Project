# =============================================
# BACKEND STATEFULSETS (with MongoDB init check)
# =============================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}
spec:
  serviceName: user-service
  replicas: {{ .Values.userService.replicas }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: {{ .Values.userService.image.repository }}:{{ .Values.userService.image.tag }}
        command: ['sh', '-c', 'echo "Waiting 15s for MongoDB to be ready..."; sleep 15; echo "Wait complete, starting service!"']
      containers:
      - name: user-service
        image: {{ .Values.userService.image.repository }}:{{ .Values.userService.image.tag }}
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: '3001'
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: clahanstore-secrets
              key: MONGO_URI_USER
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3