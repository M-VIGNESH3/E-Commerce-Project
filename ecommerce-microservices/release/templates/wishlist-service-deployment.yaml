apiVersion: apps/v1
kind: Deployment
metadata:
  name: wishlist-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.wishlistService.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: wishlist-service
  template:
    metadata:
      labels:
        app: wishlist-service
    spec:
      containers:
      - name: wishlist-service
        image: {{ .Values.wishlistService.image.repository }}:{{ .Values.wishlistService.image.tag }}
        ports:
        - containerPort: 3007
        env:
        - name: PORT
          value: '3007'
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: PRODUCT_SERVICE_URL
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: clahanstore-secrets
              key: MONGO_URI_WISHLIST
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi